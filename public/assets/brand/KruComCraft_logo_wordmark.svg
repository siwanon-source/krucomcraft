<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">KruComCraft Wordmark</title>
<desc id="desc">Wordmark-only KruComCraft logo with Code Create Connect tagline.</desc>
<rect width="920" height="220" rx="30" fill="#FFFFFF"/>
<text x="40" y="98" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-2.2" fill="#0F172A">Kru</text>
<text x="154" y="98" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-2.2" fill="#2563EB">Com</text>
<text x="323" y="98" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="74" font-weight="700" letter-spacing="-2.2" fill="#7C3AED">Craft</text>
<text x="45" y="148" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="9.5" fill="#334155">CODE</text>
<circle cx="176" cy="140" r="5" fill="#7C3AED"/>
<text x="204" y="148" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="9.5" fill="#334155">CREATE</text>
<circle cx="394" cy="140" r="5" fill="#0891B2"/>
<text x="423" y="148" font-family="Kanit, Sarabun, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="9.5" fill="#334155">CONNECT</text>
<text x="45" y="188" font-family="Sarabun, Kanit, Arial, sans-serif" font-size="25" font-weight="400" fill="#64748B">สร้างสรรค์การเรียนรู้คอมพิวเตอร์ยุคใหม่</text>
</svg>